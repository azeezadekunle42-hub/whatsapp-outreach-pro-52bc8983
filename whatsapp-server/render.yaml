services:
  - type: web
    name: whatsapp-server
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: whatsapp-data
      mountPath: /opt/render/.wwebjs_auth
      sizeGB: 1
